name: Build voxhora-mac

# CI workflow — verifies the Mac build on every push to main + every PR.
# Closes the "no CI/CD" gap from Phase B engineer audit (2026-05-16).
#
# Note: voxhora-mac references shared source files in ../voxhora-ios via
# project.yml relative paths. CI checks out BOTH repos so the build can
# resolve those references.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build macOS (Debug)
    runs-on: macos-15

    steps:
      - name: Checkout voxhora-mac
        uses: actions/checkout@v4
        with:
          path: voxhora-mac

      - name: Checkout voxhora-ios (shared source)
        uses: actions/checkout@v4
        with:
          repository: SanPatriciodeCuernavaca/voxhora-ios
          path: voxhora-ios
          token: ${{ secrets.VOXHORA_IOS_PAT }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi

      - name: Regenerate xcodeproj
        working-directory: voxhora-mac
        run: xcodegen generate

      - name: Build Mac Debug
        working-directory: voxhora-mac
        run: |
          xcodebuild \
            -project Voxhora-Mac.xcodeproj \
            -scheme Voxhora-Mac \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Report build status
        if: success()
        run: echo "✓ Mac Debug build green"
