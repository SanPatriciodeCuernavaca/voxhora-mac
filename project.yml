      # iOS 18 / macOS 15 race with sheet dismissal (AttributeGraph
      # drops binding writes mid-rebuild). Apple-canonical pattern
      # per WWDC23 "Migrating to Observable macro" + Backyard Birds
      # sample. Both MainTabView (iPhone) and MacMainView (Mac) read
      # the SAME AppState via @Environment + @Bindable for the
      # TabView selection binding.
      - path: ../voxhora-ios/Voxhora/Engine/AppState.swift
        group: SharedEngine
      # DECISION 054 follow-up round 4 (2026-05-10) — wrapper view
      # that applies `.id(appState.tabResetNonces[tabID])` to its
      # content. Hero pills increment the target tab's nonce, which
      # re-renders the wrapped tab from scratch — popping every
      # NavigationLink push back to root. Used by TabRegistry's
      # content closures.
      - path: ../voxhora-ios/Voxhora/Views/TabResetGate.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Engine/CalendarCleanupMigration.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/CaseTypeFilter.swift
