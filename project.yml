      # default-safe.
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV18Bootstrap.swift
        group: SharedEngine
      # BETA Cloud Agent (Patrick 2026-05-27) — schema v18 → v19.
