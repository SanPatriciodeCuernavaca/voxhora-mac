      - path: ../voxhora-ios/Voxhora/Views/ClientDocsRow.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/ClientDocViewerSheet.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/DocsButton.swift
        group: SharedViews
      # DECISION 044 (Apple Contacts auto-sync, 2026-05-06) — one-way
