      # "criminal_defense"). Bootstrap seeds empty-after-migration
      # values back to criminal_defense so the (practice area ×
      # jurisdiction) detector registry resolves correctly on
      # post-upgrade PDF intake.
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV16Bootstrap.swift
        group: SharedEngine
      # Discovery Portal v2 Phase 2.7 (2026-05-26) — AttorneyProfile
