      # ClientTrunk + ClientNoteTrunk pattern.
      - path: ../voxhora-ios/Voxhora/Engine/CaseTrunk.swift
        group: SharedEngine
      # DECISION 054 follow-up (2026-05-10) — shared
      # jurisdiction-driven courts loader. Reads
      # Voxhora/Resources/Jurisdictions/travis_county_courts.json
      # (and future per-jurisdiction equivalents). Used by
      # CaseEditSheet's Court picker.
      - path: ../voxhora-ios/Voxhora/Engine/CourtsLookup.swift
        group: SharedEngine
      # DECISION 054 follow-up round 2 (2026-05-10) — @Observable
      # shared model held as @State at the App root + injected via
      # `.environment(_:)`. Replaces the prior `TabSwitcher` singleton
