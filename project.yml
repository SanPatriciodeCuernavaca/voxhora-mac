name: Voxhora-Mac
options:
  bundleIdPrefix: com.patrickfagerberg
  deploymentTarget:
    macOS: "15.1"
  developmentLanguage: en
  groupSortPosition: top

# Visual quality bar (2026-05-09) — SPM packages mirror iOS project.yml.
# Vortex is the foundation across all platforms (watchOS-native particle
# engine). Inferno + Pow added at Stage 3 when premium-polish visuals
# (Mac + iPhone + iPad only) land; Watch falls back to layers 1+2.
packages:
  Vortex:
    url: https://github.com/twostraws/Vortex
    from: "1.0.4"
  # Visual quality bar Beat D 2026-05-09 — Pow + Inferno excluded;
  # native SwiftUI primitives replace both. See iOS project.yml
  # packages section for rationale.

settings:
  base:
    DEVELOPMENT_TEAM: S4GM27H6N5
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.patrickfagerberg.voxhora.mac
    # 2026-05-07 follow-up — switched from GENERATE_INFOPLIST_FILE: YES
    # (auto-generated via INFOPLIST_KEY_* shorthand, simple keys only) to
    # an explicit Info.plist file written by xcodegen's `info:` block on
    # the target. Required because CFBundleDocumentTypes (the PDF
    # registration that lets Mac act as an Open With / Share Sheet target
    # for court-appointment PDFs) is a structured array, which the
    # INFOPLIST_KEY_* path can't represent. Same pattern iOS uses.
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Voxhora-Mac/Info.plist
    CODE_SIGN_ENTITLEMENTS: Voxhora-Mac/Voxhora-Mac.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  Voxhora-Mac:
    type: application
    platform: macOS
    dependencies:
      # DECISION 045 Stage 5 — embed Voxhora-Mac-Share extension as
      # Voxhora-Mac.app/Contents/PlugIns/Voxhora-Mac-Share.appex.
      # Adds Voxhora-Mac to the macOS NSSharingService menu (Preview
      # Share button, Mail attachment Share, Finder toolbar Share).
      # The extension is self-contained: parses PDF + saves Client to
      # the App-Group-shared SwiftData container. NEVER opens the main
      # Voxhora-Mac app (same Niagara Falls discipline as iOS).
      - target: Voxhora-Mac-Share
        embed: true
        codeSign: true
      # Visual quality bar 2026-05-09 — Vortex particle engine.
      - package: Vortex
      # Visual quality bar Beat D 2026-05-09 — premium polish via
      # native SwiftUI (no extra deps).
    sources:
      # Mac-specific app code
      - path: Voxhora-Mac
        excludes:
          - "Voxhora-Mac.entitlements"

      # SHARED models — single source of truth lives in the iOS project.
      # Direct references; no copy, no drift. CloudKit schema matches both
      # platforms exactly because they compile against the same files.
      - path: ../voxhora-ios/Voxhora/Models/Entry.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/Client.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/Case.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/AttorneyProfile.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/UserPreferences.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/AuditLogEntry.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/Voucher.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/CalendarEvent.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/ClientNote.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/ParsedAppointmentIntake.swift
        group: SharedModels

      # Shared engine — every platform uses the same parser, jurisdiction,
      # audit chain, sync monitor, etc. Mac needs all of these to support
      # the same capture/edit/export functionality the iPhone has.
      - path: ../voxhora-ios/Voxhora/Engine/AuditLogger.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/TabRegistry.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/CloudSyncMonitor.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/HapticFeedback.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/PlatformViewHelpers.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/QuantityMigration.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileBootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ClientSchemaV5Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ClientSchemaV6Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV5Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/RosterReconciler.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/CalendarEventTrunk.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ClientTrunk.swift
        group: SharedEngine
      # DECISION 041 (2026-05-09) — sole writer for ClientNote @Model.
      # Mirrors ClientTrunk + CalendarEventTrunk pattern.
      - path: ../voxhora-ios/Voxhora/Engine/ClientNoteTrunk.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/CalendarCleanupMigration.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/CaseTypeFilter.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/CaseTypeFilters
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/UserPreferencesSchemaV7Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/UserPreferencesSchemaV8Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/UserPreferencesBootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV7Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ClientSchemaV7Bootstrap.swift
        group: SharedEngine
      # DECISION 044 (Apple Contacts auto-sync, 2026-05-06) — one-way
      # push from Voxhora's canonical Client store to Apple Contacts.
      # Same Contacts.framework on iOS + Mac; iCloud Contacts service
      # propagates the resulting CNContacts to Watch + iPad downstream.
      - path: ../voxhora-ios/Voxhora/Engine/ContactsAuthorizationManager.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ClientContactsBridge.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ClientContactsBackfillBootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ClientContactsCleanupBootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ClientCommunicationRouter.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/QuickAction.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV8Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/EmailTemplate.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV9Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV10Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV11Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV12Bootstrap.swift
        group: SharedEngine
      # DECISION 048 (Watch status indicator framework, 2026-05-07) —
      # closed-palette predicate-driven indicator system. Mac uses the
      # types via Settings UI (Stage 5 Settings sub-section) but does
      # not render Watch indicators itself.
      - path: ../voxhora-ios/Voxhora/Engine/WatchStatusIndicatorPredicate.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/WatchStatusIndicator.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/WatchIndicatorColor.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/WatchStatusIndicatorPredicateRegistry.swift
        group: SharedEngine
      # DECISION 049 (Watch manual billing presets, 2026-05-08) +
      # DECISION 050 (cross-platform billing presets, 2026-05-08).
      # BillingPreset value type used by Settings UI and (in
      # principle) ManualEntryForm on Mac. Bootstrap is iOS + Mac only.
      # NOTE: ManualBillingActivity (DECISION 049's hallucinated 8-default
      # struct) DELETED by DECISION 050 — see feedback memory
      # `feedback_no_hallucination_mirror_existing_patterns.md`.
      - path: ../voxhora-ios/Voxhora/Engine/BillingPreset.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV13Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV14Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV15Bootstrap.swift
        group: SharedEngine
      # DECISION 051 (Fun Mode plugin architecture, 2026-05-08 EOS-5+).
      # Folder glob picks up all Visuals/ + Sounds/ + protocol/registry/
      # orchestrator/bootstrap files. Adding a new effect = one file
      # in the corresponding subfolder + one register line in
      # FunModeBootstrap.swift; both projects auto-rebuild.
      - path: ../voxhora-ios/Voxhora/Engine/FunMode
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/UserPreferencesSchemaV9Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/UserPreferencesSchemaV10Bootstrap.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/UserPreferencesSchemaV11Bootstrap.swift
        group: SharedEngine
      # Note: WatchBillingPresetsSection.swift + BillTimeEntryModeSection.swift
      # (DECISION 049 settings UI) are picked up automatically via the
      # `../voxhora-ios/Voxhora/Views/Settings` folder glob below — no
      # explicit entry here.
      - path: ../voxhora-ios/Voxhora/Engine/AppointmentLetterParser.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AppointmentLetterParsers
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/PDFIntakeRouter.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AutoBillingHelper.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/SMSReminderScheduler.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ReminderActionRouter.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/CallTrackingService.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/SIPPollScheduler.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/CalendarRefreshScheduler.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/CustodyStatusSource.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/CustodyStatusSources
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/CalendarSources
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/Jurisdiction.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/CalendarSource.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/JurisdictionMutator.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/Jurisdictions
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/KeychainHelper.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ExportAdapter.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ExportAdapters
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ClientRosterImporter.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/RosterImporters
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/Parser
        group: SharedEngine

      # Shared theme — colors, fonts, brand language. Same look on both.
      - path: ../voxhora-ios/Voxhora/Theme
        group: SharedTheme

      # Shared views — the lawyer-grade UI. Cross-platform via
      # PlatformViewHelpers shims + HapticFeedback abstraction.
      # CaptureView (voice) is excluded for now — Mac voice capture
      # needs entitlements + UX work; ManualEntryForm covers Mac
      # capture in this iteration.
      - path: ../voxhora-ios/Voxhora/Views/MoneyCounter.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/RatePickerSheet.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/ClientFilterSheet.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/AppHeader.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/ComingSoonView.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/TodayView.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/EntryRow.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/EditEntrySheet.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/ManualEntryForm.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/ClientPickerView.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/BillTimeButton.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/CaptureView.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/VouchersView.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/ClientRosterRow.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/ClientsView.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/AddClientSheet.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/ClientDetailView.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/ClientInfoSheet.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/ContactClientSheet.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/IntakeView.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/PDFImportSheet.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/IntroEmailComposer.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/SendReminderSheet.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/CallDurationSheet.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/AppearBadge.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/CalendarEventRow.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/CalendarView.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/CalendarRangeView.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/NotesButton.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/ClientNotesSheet.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/SettingsView.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/Settings
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Views/OnboardingView.swift
        group: SharedViews
      - path: ../voxhora-ios/Voxhora/Engine/Voice
        group: SharedEngine

      # Shared resources — jurisdiction JSON, LLM system prompt.
      # NOTE: no `type: folder` — that would double-nest the bundle to
      # Contents/Resources/Resources/Jurisdictions/. We want flat Bundle.main
      # resolution: Bundle.main.url(forResource: "travis_county", withExtension: "json",
      # subdirectory: "Jurisdictions"). xcodegen adds each file at the right depth.
      - path: ../voxhora-ios/Voxhora/Resources
        group: SharedResources

    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES
    # 2026-05-07 — Info.plist generated from this YAML block on every
    # xcodegen pass. Lives at Voxhora-Mac/Info.plist (committed under
    # version control). The Mac-specific keys previously declared via
    # INFOPLIST_KEY_* now live here as structured properties because
    # CFBundleDocumentTypes (PDF document handler registration) is a
    # nested array and the INFOPLIST_KEY_* shorthand can't represent it.
    info:
      path: Voxhora-Mac/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.business
        NSHumanReadableCopyright: "Voxhora — Patrick Fagerberg"
        # DECISION 044 — Contacts permission usage description. Same
        # one-way push contract as iPhone side; permission requested
        # lazily on first ClientContactsBridge.push (typically backfill
        # bootstrap).
        NSContactsUsageDescription: "Voxhora syncs your client roster to Apple Contacts (one-way only) so phone numbers, addresses, and emails appear automatically across iPhone, iPad, Mac, and Apple Watch."
        # DECISION 025 follow-up (2026-05-07) — Mac PDF document handler
        # registration. Lets Voxhora-Mac act as an Open With / Share
        # target for court-appointment PDFs (right-click PDF in Finder/
        # Mail → Open With → Voxhora-Mac, OR drag PDF onto Voxhora-Mac
        # Dock icon, OR Mail's Share menu surfaces Voxhora-Mac).
        # `LSHandlerRank: Default` matches iOS rank — Voxhora handles
        # court-appointment PDFs as a primary use case (vs system PDF
        # owners like Preview which keep `Owner` rank). Same VoxhoraApp
        # `.onOpenURL` pattern that iOS uses fires on Mac when a PDF
        # opens via these paths.
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Court Appointment PDF"
            LSHandlerRank: Default
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - com.adobe.pdf
            CFBundleTypeIconFiles: []
    # postBuildScripts intentionally disabled 2026-05-02 ~13:35.
    #
    # The "Refresh /Applications/Voxhora-Mac.app for Launchpad" script
    # ran in the wrong phase order: xcodegen's `postBuildScripts` are
    # appended to the target's `buildPhases` array, which Xcode
    # processes BEFORE its implicit CodeSign pass. Result: the script
    # ditto'd an unsigned binary into /Applications every rebuild, and
    # Launchpad-launch failed with NSPOSIXErrorDomain Code 163
    # ("Launchd job spawn failed") because macOS won't spawn an
    # unsigned app from /Applications.
    #
    # Workaround for now: when Launchpad needs the latest build,
    # manually run:
    #
    #   pkill -lf "Voxhora-Mac"
    #   mv /Applications/Voxhora-Mac.app /tmp/voxmac-old-$(date +%H%M%S).app
    #   ditto ~/Library/Developer/Xcode/DerivedData/Voxhora-Mac-*/Build/Products/Debug/Voxhora-Mac.app /Applications/Voxhora-Mac.app
    #   open /Applications/Voxhora-Mac.app
    #
    # Proper fix (deferred to v0.4.x): use an xcodegen scheme
    # `postActions` block — those run AFTER the entire build pipeline
    # including CodeSign. Or have the in-script ditto run codesign
    # --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" with the
    # entitlements file so the resulting bundle is launchable.

  # DECISION 045 Stage 5 — macOS Share Extension. Sibling target to
  # Voxhora-Mac, embedded into Voxhora-Mac.app's Contents/PlugIns/.
  # Adds Voxhora-Mac to the macOS NSSharingService menu (Preview's
  # Share button, Mail attachment Share, Finder toolbar Share, etc.).
  #
  # ARCHITECTURE: Same self-contained mini-IntakeView as iOS Voxhora-
  # Share — parses PDF + saves Client to App-Group-shared SwiftData
  # IN the share sheet, never launches the main Voxhora-Mac app.
  # AppKit version (NSViewController + NSSharingService activation
  # rule) but uses the SAME shared SwiftUI PDFIntakeShareForm as iOS
  # via cross-reference.
  Voxhora-Mac-Share:
    type: app-extension
    platform: macOS
    sources:
      - path: Voxhora-Mac-Share
        excludes:
          - "Info.plist"
          - "Voxhora-Mac-Share.entitlements"

      # Cross-referenced shared SwiftUI form — single source of truth
      # for the in-share intake form. iOS-specific modifiers (keyboard
      # types, autocapitalization) are #if os(iOS)-gated so the file
      # compiles cleanly on macOS too.
      - path: ../voxhora-ios/Voxhora-Share/PDFIntakeShareForm.swift
        group: SharedShare

      # Shared @Model files — single source of truth lives in the iOS
      # project. Same cross-reference pattern Voxhora-Mac uses for
      # main-app SwiftData.
      - path: ../voxhora-ios/Voxhora/Models/Entry.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/Client.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/Case.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/AttorneyProfile.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/UserPreferences.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/AuditLogEntry.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/Voucher.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/CalendarEvent.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/ClientNote.swift
        group: SharedModels
      - path: ../voxhora-ios/Voxhora/Models/ParsedAppointmentIntake.swift
        group: SharedModels

      # Shared engine — same files iOS Voxhora-Share uses. QuickAction
      # is required by AttorneyProfile @Model; TabRegistry by
      # UserPreferences (gated via VOXHORA_SHARE_EXTENSION flag);
      # EmailTemplate by AttorneyProfile.
      - path: ../voxhora-ios/Voxhora/Engine/QuickAction.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/TabRegistry.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/EmailTemplate.swift
        group: SharedEngine

      # PDF parser pipeline — same regex-based parser as iOS extension
      # + main app's PDFImportSheet. Pure local parse, no network.
      - path: ../voxhora-ios/Voxhora/Engine/AppointmentLetterParser.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AppointmentLetterParsers/AppointmentLetterParserRegistry.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AppointmentLetterParsers/TravisCountyAppointmentLetterParser.swift
        group: SharedEngine

      # Save path engine — canonical ClientTrunk.findOrCreate.
      # ClientContactsBridge calls in ClientTrunk are #if !VOXHORA_SHARE_EXTENSION
      # gated (Apple Contacts mirror not invoked from extension sandbox).
      - path: ../voxhora-ios/Voxhora/Engine/ClientTrunk.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/RosterReconciler.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/AuditLogger.swift
        group: SharedEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.patrickfagerberg.voxhora.mac.shareextension
        PRODUCT_NAME: Voxhora-Mac-Share
        INFOPLIST_FILE: Voxhora-Mac-Share/Info.plist
        CODE_SIGN_ENTITLEMENTS: Voxhora-Mac-Share/Voxhora-Mac-Share.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES   # Extensions install via embedding only
        # Same Swift compilation flag as iOS Voxhora-Share — gates the
        # iOS-app-only view references in TabRegistry + Apple Contacts
        # call sites in ClientTrunk so the extension compiles cleanly.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: VOXHORA_SHARE_EXTENSION
    info:
      path: Voxhora-Mac-Share/Info.plist
      properties:
        CFBundleDisplayName: Voxhora
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        # NSExtension declaration — share-services point + principal
        # class. Activation rule (predicate string) restricts the
        # extension to PDF attachments (com.adobe.pdf UTI conformance).
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule: "SUBQUERY(extensionItems, $extensionItem, SUBQUERY($extensionItem.attachments, $attachment, ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO \"com.adobe.pdf\").@count == 1).@count == 1"
