        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ClientDocTrunk.swift
        group: SharedEngine
      - path: ../voxhora-ios/Voxhora/Engine/ClientSchemaV8Bootstrap.swift
