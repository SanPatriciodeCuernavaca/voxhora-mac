      - path: ../voxhora-ios/Voxhora/Engine/AttorneyProfileSchemaV17Bootstrap.swift
        group: SharedEngine
      # BYO Downloader + TechShare Login (2026-05-26) — AttorneyProfile
      # schema v17 → v18 sanity pass. Adds discoverySourceMode +
      # discoveryFolderNamingConvention (per-attorney CloudKit-synced
      # choice between Voxhora's TechShare agent and external
      # downloaders like Scover Legal). Default "voxhora" + "canonical"
